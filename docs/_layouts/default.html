<!DOCTYPE html>
<html lang="{% if page.permalink contains 'privacy-de' %}de{% else %}en{% endif %}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} &middot; VO2.ai</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="icon" type="image/png" href="{{ '/assets/favicon.png' | relative_url }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
</head>
<body class="doc">

  <header class="site-header">
    <div class="container">
      <a class="wordmark" href="{{ '/' | relative_url }}">VO2<span class="dot">.</span>ai</a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/privacy/' | relative_url }}">Privacy</a>
        <a href="https://github.com/andij71/VO2.ai" target="_blank" rel="noopener">GitHub</a>
      </nav>
    </div>
  </header>

  <main>
    <article class="doc-content">
      <div class="container narrow">
        {{ content }}
      </div>
    </article>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-grid">
        <div>
          <p class="wordmark small">VO2<span class="dot">.</span>ai</p>
          <p class="foot-note">Built by Andreas Junemann &middot; Berlin</p>
        </div>
        <div class="foot-links">
          <a href="{{ '/privacy/' | relative_url }}">Privacy</a>
          <a href="{{ '/privacy-de/' | relative_url }}">Datenschutz</a>
          <a href="https://github.com/andij71/VO2.ai" target="_blank" rel="noopener">GitHub</a>
          <a href="https://github.com/andij71/VO2.ai/issues" target="_blank" rel="noopener">Support</a>
        </div>
      </div>
    </div>
  </footer>

</body>
</html>
